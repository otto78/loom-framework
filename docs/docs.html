<script>
function setLang(l){
  document.documentElement.dataset.lang=l;
  document.getElementById('lang-select').value=l;
  localStorage.setItem('loom-lang',l);
  renderAll(); // Re-render to apply language change
}
function toggleDark(){
  const dark=document.documentElement.dataset.theme==='dark';
  document.documentElement.dataset.theme=dark?'light':'dark';
  document.getElementById('btn-dark').innerHTML=dark?'&#127769;':'&#9728;&#65039;';
  localStorage.setItem('loom-dark',!dark);
}

function copyAllDocs(){
  const lang=document.documentElement.dataset.lang||'en';
  const sections=DOCS.map(doc=>{
    const content=(lang==='it'&&doc.contentIt)?doc.contentIt:doc.content;
    return content;
  });
  const full='# LOOM Framework — Full Documentation\n\n---\n\n'+sections.join('\n\n---\n\n');
  const btn=document.getElementById('btn-copy-all');
  navigator.clipboard.writeText(full).then(()=>{
    const orig=btn.innerHTML;
    btn.innerHTML='<span class="en">&#9989; Copied!</span><span class="it">&#9989; Copiato!</span>';
    btn.style.background='#28a745';
    setTimeout(()=>{btn.innerHTML=orig;btn.style.background='';},2500);
  });
}

> **Weave intelligent agents into your development workflow**

A complete operational framework for AI-powered development across multiple IDEs. loom provides structure, automation, and best practices for teams working with AI agents.

---

## ❌ The Problem

AI-assisted development faces critical challenges:
1. **Context Window Limitations** — Agents lose memory when context resets.
2. **Multi-Agent Chaos** — Switching IDEs loses context.
3. **Token Waste** — Repetitive prompts waste tokens and reduce accuracy.

---

## ✅ The Solution

loom solves these through **persistent file-based memory** and **DOE architecture**:
- 🧠 **Persistent Memory** — TASKS.md, STORY.md survive resets.
- 🔄 **Multi-Agent Support** — Same state across multiple IDEs.
- 🚀 **Zero-Friction** — Just say "read loom".

---

---

## 🚀 Method 1: Zero-Friction (Easiest)

**For new projects (4 steps):**

3. Add \`loom/\` folder to your project.

  id:'project',icon:'&#128203;',labelEn:'PROJECT.md Guide',labelIt:'Guida PROJECT.md',file:'PROJECT-MD-GUIDE.md',
  content:`# PROJECT.md — The Foundation of LOOM

> **The single source of truth for your project.** Without it, the agent works blind. With it, the agent becomes your perfect teammate.

---

## What is PROJECT.md?

**PROJECT.md** tells LOOM everything it needs to know:

| Section | What It Contains | Why It Matters |
|---------|------------------|----------------|
| **Goal** | 2-3 sentences describing what you're building | Agent knows the big picture |
| **Stack** | Technologies with versions (Python 3.11, React 18, etc.) | Agent uses correct syntax & APIs |
| **Architecture** | 3-5 key design decisions | Agent respects your patterns |
| **Rules** | MUST-FOLLOW coding standards | Agent follows your conventions |
| **Notes** | Constraints, gotchas, past decisions | Agent avoids known pitfalls |

---

## The PROJECT.md Flow

When you say **"read loom"**, here's what happens:

\`\`\`
1. Agent checks for PROJECT.md
   ├── EXISTS? → Read it and configure everything
   └── MISSING? → Ask you what to do:
       ├── "Create it for me" → Agent analyzes codebase & creates PROJECT.md
       ├── "Help me write it" → Agent asks questions, you answer
       └── "I'll do it myself" → Agent shows template & waits
\`\`\`

### If Project Already Has Code

**Loom can auto-generate PROJECT.md by analyzing:**
- \`package.json\` / \`pyproject.toml\` / \`requirements.txt\` → detects stack
- \`README.md\` → extracts goal
- Directory structure → infers architecture
- Existing tests → understands rules
- \`.gitignore\`, CI config → detects constraints

**Prompt to use:**
\`\`\`
"This project already has code. Analyze it and create a PROJECT.md for me.
Look at my stack, structure, and any existing docs."
\`\`\`

### If Starting From Scratch

**Let loom guide you:**
\`\`\`
"Help me write PROJECT.md. Ask me questions about:
1. What does this project do?
2. What technologies will you use?
3. What are 3-5 key architectural decisions?
4. What rules MUST be followed?
5. Any constraints or gotchas I should know?"
\`\`\`

---

## Real-World Example: FastAPI API

\`\`\`markdown
# TaskFlow API

## Goal
REST API for personal task management. Users create, update, and track tasks with deadlines, priorities, and team collaboration.

## Stack
- Backend: Python 3.11 + FastAPI
- Database: PostgreSQL 15 (asyncpg + SQLAlchemy v2)
- Auth: JWT (python-jose)
- Testing: pytest + httpx
- Hosting: Render.com

## Architecture
- Stateless REST API (no frontend)
- Business logic ONLY in service layer
- Async/await throughout
- Models → Services → Routes pattern

## Rules
- Every endpoint MUST have a test
- NO direct DB queries in routes
- ALL functions MUST have docstrings
- NEVER use git add -A (selective commits)
- Type hints required on all functions

## Notes
- DB has 2M user records: avoid unindexed queries
- Rate limit: 100 req/min per user token
- API versioning: all endpoints start with /api/v1/
\`\`\`

---

## AI Prompts for PROJECT.md

### Prompt 1: Auto-Generate from Existing Code
\`\`\`
"Analyze my codebase and create a draft PROJECT.md.
Look at:
- package.json / pyproject.toml (detect stack)
- README.md (extract goal)
- Code structure (infer architecture)
- Tests and CI config (detect rules)

Then show me the draft so I can edit it."
\`\`\`

### Prompt 2: Guided Creation
\`\`\`
"Help me write PROJECT.md for my project.
I'll answer questions about goal, stack, architecture, rules, and constraints.
Ask me one question at a time."
\`\`\`

### Prompt 3: Refine Existing
\`\`\`
"Review my PROJECT.md:
- Is the Goal clear and specific?
- Are Stack versions complete?
- Are rules actionable (not vague)?
- Did I miss important constraints?
- Would an agent understand this?"
\`\`\`

---

## Quality Checklist

✅ **Goal**: 2-3 sentences, crystal clear  
✅ **Stack**: Specific versions (not just "Python")  
✅ **Architecture**: Actual decisions (not "modular")  
✅ **Rules**: MUST-FOLLOW (not "should follow")  
✅ **Notes**: Documented constraints & gotchas  
✅ **Length**: 50-80 lines (concise, not rambling)

---

## Next Steps

1. **Create PROJECT.md** in your project root
2. **Tell agent**: "read loom" or "leggi loom"
3. **Agent auto-configures** based on YOUR PROJECT.md!

**Remember**: PROJECT.md is YOUR voice telling the agent what to care about. Make it clear, make it specific, and the agent will deliver amazing work! 🎯`,
  contentIt:`# PROJECT.md — La Fondazione di LOOM

> **La fonte unica di verità per il tuo progetto.** Senza di esso, l'agente lavora alla cieca. Con esso, l'agente diventa il tuo compagno di team perfetto.

---

## Cos'è PROJECT.md?

**PROJECT.md** dice a LOOM tutto ciò che deve sapere:

| Sezione | Cosa Contiene | Perché Importa |
|---------|---------------|----------------|
| **Goal** | 2-3 frasi che descrivono cosa stai costruendo | L'agente conosce il quadro generale |
| **Stack** | Tecnologie con versioni (Python 3.11, React 18, etc.) | L'agente usa sintassi & API corrette |
| **Architettura** | 3-5 decisioni chiave di design | L'agente rispetta i tuoi pattern |
| **Regole** | Standard di codice MUST-FOLLOW | L'agente segue le tue convenzioni |
| **Note** | Vincoli, gotchas, decisioni passate | L'agente evita problemi noti |

---

## Il Flusso PROJECT.md

Quando dici **"leggi loom"**, ecco cosa succede:

\`\`\`
1. L'agente controlla se esiste PROJECT.md
   ├── ESISTE? → Lo legge e configura tutto
   └── MANCANTE? → Ti chiede cosa fare:
       ├── "Crealo per me" → L'agente analizza il codebase e crea PROJECT.md
       ├── "Aiutami a scriverlo" → L'agente fa domande, tu rispondi
       └── "Lo faccio io" → L'agente mostra il template e aspetta
\`\`\`

### Se il Progetto Ha Già Codice

**Loom può auto-generare PROJECT.md analizzando:**
- \`package.json\` / \`pyproject.toml\` / \`requirements.txt\` → rileva stack
- \`README.md\` → estrae goal
- Struttura directory → inferisce architettura
- Test esistenti → capisce regole
- \`.gitignore\`, CI config → rileva vincoli

**Prompt da usare:**
\`\`\`
"Questo progetto ha già codice. Analizzalo e crea un PROJECT.md per me.
Guarda il mio stack, struttura, e documentazione esistente."
\`\`\`

### Se Si Parte da Zero

**Lascia che loom ti guidi:**
\`\`\`
"Aiutami a scrivere PROJECT.md. Fammi domande su:
1. Cosa fa questo progetto?
2. Quali tecnologie userai?
3. Quali sono 3-5 decisioni architetturali chiave?
4. Quali regole DEVONO essere seguite?
5. Ci sono vincoli o gotchas che dovrei sapere?"
\`\`\`

---

## Esempio Reale: FastAPI API

\`\`\`markdown
# TaskFlow API

## Goal
REST API per task management personale. Gli utenti creano, aggiornano e tracciano task con scadenze, priorità e collaborazione team.

## Stack
- Backend: Python 3.11 + FastAPI
- Database: PostgreSQL 15 (asyncpg + SQLAlchemy v2)
- Auth: JWT (python-jose)
- Testing: pytest + httpx
- Hosting: Render.com

## Architettura
- Stateless REST API (no frontend)
- Business logic SOLO nel service layer
- Async/await ovunque
- Pattern Models → Services → Routes

## Regole
- Ogni endpoint DEVE avere un test
- NO query DB dirette nelle routes
- TUTTE le funzioni DEVONO avere docstrings
- MAI usare git add -A (commit selettivi)
- Type hints richieste su tutte le funzioni

## Note
- DB ha 2M record utente: evita query senza indici
- Rate limit: 100 req/min per token utente
- API versioning: tutti gli endpoint iniziano con /api/v1/
\`\`\`

---

## Prompt AI per PROJECT.md

### Prompt 1: Auto-Genera da Codice Esistente
\`\`\`
"Analizza il mio codebase e crea una bozza di PROJECT.md.
Guarda:
- package.json / pyproject.toml (rileva stack)
- README.md (estrai goal)
- Struttura del codice (inferisci architettura)
- Test e CI config (rileva regole)

Poi mostrami la bozza così posso modificarla."
\`\`\`

### Prompt 2: Creazione Guidata
\`\`\`
"Aiutami a scrivere PROJECT.md per il mio progetto.
Risponderò a domande su goal, stack, architettura, regole e vincoli.
Fammi una domanda alla volta."
\`\`\`

### Prompt 3: Affina Esistente
\`\`\`
"Revisiona il mio PROJECT.md:
- Il Goal è chiaro e specifico?
- Lo Stack ha versioni complete?
- Le regole sono azionabili (non vaghe)?
- Ho perso vincoli importanti?
- Un agente capirebbe questo?"
\`\`\`

---

## Checklist Qualità

✅ **Goal**: 2-3 frasi, cristallino  
✅ **Stack**: Versioni specifiche (non solo "Python")  
✅ **Architettura**: Decisioni reali (non "modulare")  
✅ **Regole**: MUST-FOLLOW (non "dovresti seguire")  
✅ **Note**: Vincoli & gotchas documentati  
✅ **Lunghezza**: 50-80 righe (conciso, non verboso)

---

## Prossimi Passi

1. **Crea PROJECT.md** nella root del tuo progetto
2. **Di' all'agente**: "read loom" o "leggi loom"
3. **L'agente si auto-configura** in base al TUO PROJECT.md!

**Ricorda**: PROJECT.md è la TUA voce che dice all'agente cosa deve importare. Rendiolo chiaro, rendilo specifico, e l'agente farà un lavoro straordinario! 🎯`

  content:`# TDD Workflow — Test-Driven Development

> Complete Test-Driven Development workflow integrated in the framework.

---

## What is TDD?

1. **Write tests FIRST** — before any code
2. **Run tests** — they must fail (Red phase)
3. **Write minimal code** — to make tests pass (Green phase)
4. **Refactor** — clean up while keeping tests green

---

## Red-Green-Refactor Cycle

\`\`\`
RED    -> Write failing test
GREEN  -> Write minimal code to pass
REFACTOR -> Clean up, tests stay green
Repeat for next feature
\`\`\`

---

## Commands

\`\`\`bash
# Start TDD task (creates test file, runs tests - Red phase)
python scripts/task-tdd.py start TASK-001 "Add email validation"

# Run tests
python scripts/task-tdd.py test

# Complete task (only if all tests pass)
python scripts/task-tdd.py complete TASK-001
\`\`\`

---

## Example Test File

\`\`\`python
# tests/test_task_001.py

def test_valid_email():
    from myapp import validate_email
    assert validate_email("user@example.com") == True

def test_invalid_email():
    from myapp import validate_email
    assert validate_email("invalid") == False

def test_empty_email():
    from myapp import validate_email
    assert validate_email("") == False
    assert validate_email(None) == False
\`\`\`

---

## TASKS.md TDD Checklist

\`\`\`markdown

- [x] Red: Tests created and failing
- [ ] Green: Implement feature to pass tests
- [ ] Refactor: Clean up code
- [ ] Complete: All tests passing

## Best Practices

- **Small focused tests** — one test, one behavior
- **Descriptive names** — \`test_empty_email_returns_false\`
- **Arrange-Act-Assert** pattern
- **Independent tests** — no shared state
- **Cover edge cases** — empty, null, boundary values`,

  content:`# Monorepo Usage Guide

> Using LOOM in monorepo projects with multiple packages/services.

---

## What is a Monorepo?

A monorepo contains multiple projects/packages in a single repository:

\`\`\`
monorepo/
├── packages/
│   ├── frontend/
│   ├── backend/
│   └── shared/
├── services/
│   ├── api/
│   └── worker/
└── tools/
\`\`\`

---

## Approach 1: Root-Level LOOM (Recommended)

Setup LOOM at the repository root to manage the entire monorepo as one project.

\`\`\`bash
cd /path/to/monorepo
python loom/scripts/setup.py
\`\`\`

**Result:** Single AGENT.md, TASKS.md for the whole monorepo.

**When to use:**
- Packages are tightly coupled
- Single team manages everything
- Shared versioning/releases

---

## Approach 2: Per-Package LOOM

Setup LOOM independently in each package.

\`\`\`bash
cd packages/frontend && python ../../loom/scripts/setup.py
cd packages/backend && python ../../loom/scripts/setup.py
\`\`\`

**Result:** Separate AGENT.md and TASKS.md per package.

**When to use:**
- Packages are independent
- Different teams per package
- Independent versioning

---

## Hybrid Approach

Root-level LOOM for coordination + per-package LOOM for details:

- Root AGENT.md describes overall architecture
- Each package has its own detailed AGENT.md
- Root TASKS.md tracks cross-package work
- Package TASKS.md tracks internal work`,

  id:'framework',icon:'&#127959;&#65039;',labelEn:'DOE Architecture',labelIt:'Architettura DOE',file:'doe-architecture.md',
  content:`# DOE Architecture

> **Directives / Orchestration / Execution** — The DOE Architecture that makes AI agents reliable, persistent, and token-efficient.

---

## The Problem: Probabilistic Degradation

LLMs are probabilistic. Each decision has ~90% accuracy.

**The math is brutal:**
- 1 step: 90% success
- 2 steps: 81% (0.9 × 0.9)
- 5 steps: 59%
- 10 steps: 35% ❌

Chaining LLM decisions leads to **compounding errors**. By step 10, the agent is more likely wrong than right.

**Traditional approach:** Ask the LLM to do everything in one shot.
\`\`\`
"Build me a REST API with auth, tests, and deployment"
→ 50+ decisions
→ 35% accuracy at step 10
→ Bugs, missing tests, security holes
\`\`\`

**DOE solution:** Push complexity into deterministic code. The agent only makes *decisions*, not calculations.

---

## Architecture: DOE

\`\`\`
┌─────────────────────────────────────────────────────────────┐
│ LAYER 1: DIRECTIVES (What to do)                           │
│ loom/directives/*.md — SOPs in natural language            │
│ • Objectives, inputs, outputs defined in plain English    │
│ • Agent reads once, cached for entire session               │
│ • Zero probability of error — just text files               │
├─────────────────────────────────────────────────────────────┤
│ LAYER 2: ORCHESTRATION (How to decide)                     │
│ Agent makes high-level decisions                           │
│ • Chooses which directive to apply                          │
│ • Determines parameters                                     │
│ • Routes to appropriate execution script                    │
│ • Handles errors and reports results                        │
│ • This is where the LLM thinks (90% accuracy per decision) │
├─────────────────────────────────────────────────────────────┤
│ LAYER 3: EXECUTION (Do the work) — 100% Deterministic      │
│ loom/execution/*.py — Python scripts that never hallucinate│
│ • Send the actual HTTP request                              │
│ • Write the actual file to disk                             │
│ • Make the actual Git commit                                │
│ • Zero tokens, zero probability of error                    │
└─────────────────────────────────────────────────────────────┘
\`\`\`

---

## D — Directives (What to do)

**Directives are SOPs (Standard Operating Procedures)** written in Markdown. They define:
- **Objective**: What we're trying to accomplish
- **Inputs**: What data/parameters are needed
- **Outputs**: What should be produced
- **Tool**: Which execution script to call

### Key Insight
The directive is read **once** at the start of a session and cached. The agent doesn't re-read it for every task — it knows the SOP and follows it.

### Example: \`directives/create-task.md\`

\`\`\`markdown
# Directive: Create New Task

## Objective
Create a new task entry in TASKS.md with proper formatting and metadata.

## Inputs
- task_id: Format TASK-XXX (e.g., TASK-001)
- description: Clear, actionable description
- priority: low | medium | high

## Outputs
- Updated TASKS.md with new task
- Git commit with message: "chore: add TASK-XXX [description]"

## Tool
execution/create_task.py
\`\`\`

---

## O — Orchestration (How to decide)

**Orchestration is where the AI agent works.** The agent:
1. **Parses your natural language request** ("start a new task for email validation")
2. **Selects the appropriate directive** (create-task.md)
3. **Extracts parameters** (task_id=TASK-001, description="email validation")
4. **Calls the execution script** with validated parameters
5. **Handles errors** and reports results back to you

### Why This Matters
The agent only makes **high-level decisions** (which directive, what parameters). It never:
- Writes files directly ❌
- Makes Git commits directly ❌  
- Runs shell commands directly ❌

Those go to deterministic execution scripts.

### Example Flow
\`\`\`
User: "Create task TASK-001 for email validation"
  ↓
Agent (Orchestration):
  1. Parse intent → create new task
  2. Extract params → id=TASK-001, desc="email validation"
  3. Select directive → directives/create-task.md
  4. Validate format → TASK-001 matches pattern
  5. Call execution → create_task.py --id TASK-001 --desc "email validation"
  ↓
Script (Execution):
  1. Read TASKS.md
  2. Append new task
  3. Run: git add TASKS.md && git commit -m "..."
  4. Return: {"status": "success", "task": "TASK-001"}
  ↓
Agent (Orchestration):
  1. Format success message
  2. Show to user: "✅ Created TASK-001: email validation"
\`\`\`

---

## E — Execution (Do the work)

**Execution scripts are 100% deterministic Python.** They:
- Live in \`loom/execution/*.py\`
- Have zero AI/LLM involvement
- Produce the same output for the same input, every time
- Handle the actual "work" (file I/O, Git operations, HTTP requests)

### Example: \`execution/create_task.py\`

\`\`\`python
#!/usr/bin/env python3
import argparse
import re
from datetime import datetime

def create_task(task_id: str, description: str) -> dict:
    """Create a new task in TASKS.md."""
    # Validate task_id format
    if not re.match(r'^TASK-\d{3}$', task_id):
        return {"error": "Invalid task_id format. Use TASK-XXX"}
    
    # Read current TASKS.md
    with open('TASKS.md', 'r') as f:
        content = f.read()
    
    # Check for duplicates
    if task_id in content:
        return {"error": f"Task {task_id} already exists"}
    
    # Append new task
    new_task = f"\n## {task_id}\n**Status**: 🔵 New\n**Desc**: {description}\n**Created**: {datetime.now().isoformat()}\n"
    
    with open('TASKS.md', 'w') as f:
        f.write(content + new_task)
    
    # Git commit
    import subprocess
    subprocess.run(['git', 'add', 'TASKS.md'])
    subprocess.run(['git', 'commit', '-m', f'chore: add {task_id}'])
    
    return {"status": "success", "task": task_id}

if __name__ == '__main__':
    parser = argparse.ArgumentParser()
    parser.add_argument('--id', required=True)
    parser.add_argument('--desc', required=True)
    args = parser.parse_args()
    
    result = create_task(args.id, args.desc)
    print(json.dumps(result))
\`\`\`

### Key Benefits
| Aspect | Before (LLM does everything) | After (DOE) |
|--------|------------------------------|-------------|
| Accuracy | 35% at step 10 | 90% at step 10 |
| Token cost | High (rewrites files) | Low (just decisions) |
| Reliability | Inconsistent | Deterministic |
| Speed | Slow (LLM processes) | Fast (Python scripts) |
| Audit trail | Hard to verify | Every action logged |

---

## Complete Example: Sending a Welcome Email

\`\`\`
User: "Send welcome email to user@example.com"

┌──────────────────────────────────────────────────────────┐
│ 1. DIRECTIVE — Agent reads directives/send-email.md       │
│    • Input: recipient email, template name               │
│    • Output: sent confirmation                           │
│    • Tool: execution/send_email.py                       │
├──────────────────────────────────────────────────────────┤
│ 2. ORCHESTRATION — Agent makes decisions                 │
│    • Select template: "welcome"                          │
│    • Validate email format: ✓                            │
│    • Call: send_email.py --to user@example.com --template welcome
├──────────────────────────────────────────────────────────┤
│ 3. EXECUTION — Script does the work (100% deterministic) │
│    • Load template file                                  │
│    • Call SendGrid API                                   │
│    • Return: {"status": "sent", "message_id": "xyz"}     │
├──────────────────────────────────────────────────────────┤
│ 4. ORCHESTRATION — Agent formats result                  │
│    • Parse JSON response                                 │
│    • Show: "✅ Welcome email sent to user@example.com"  │
└──────────────────────────────────────────────────────────┘
\`\`\`

---

## Summary

**DOE makes AI agents reliable by:**
1. **Caching directives** (read once, use all session)
2. **Limiting LLM decisions** to high-level routing (not file operations)
3. **Pushing all work** to deterministic Python scripts
4. **Preserving accuracy** across long sessions (90% → 90%, not 90% → 35%)

The result: Agents that actually work, every time. 🎯`,
  contentIt:`# Architettura DOE

> **Directives / Orchestration / Execution** — L'architettura DOE che rende gli agenti AI affidabili, persistenti ed efficienti nei token.

---

## Il Problema: Degrado Probabilistico

Gli LLM sono probabilistici. Ogni decisione ha un'accuratezza di circa il 90%.

**La matematica è implacabile:**
- 1 step: 90% successo
- 2 step: 81% (0.9 × 0.9)
- 5 step: 59%
- 10 step: 35% ❌

Concatenare decisioni degli LLM porta a **errori cumulativi**. Allo step 10, l'agente ha più probabilità di sbagliare che di azzeccare.

**Approccio tradizionale:** Chiedere all'LLM di fare tutto in un colpo solo.
\`\`\`
"Costruiscimi una REST API con auth, test e deployment"
→ 50+ decisioni
→ 35% accuratezza allo step 10
→ Bug, test mancanti, falle di sicurezza
\`\`\`

**Soluzione DOE:** Spingere la complessità nel codice deterministico. L'agente prende solo *decisioni*, non fa calcoli.

---

## Architettura: DOE

\`\`\`
┌─────────────────────────────────────────────────────────────┐
│ LIVELLO 1: DIRETTIVE (Cosa fare)                           │
│ loom/directives/*.md — SOP in linguaggio naturale          │
│ • Obiettivi, input, output definiti in italiano/inglese   │
│ • Agente legge una volta, cached per tutta la sessione     │
│ • Zero probabilità di errore — solo file di testo         │
├─────────────────────────────────────────────────────────────┤
│ LIVELLO 2: ORCHESTRAZIONE (Come decidere)                │
│ Agente prende decisioni ad alto livello                   │
│ • Sceglie quale direttiva applicare                       │
│ • Determina i parametri                                   │
│ • Indirizza allo script di esecuzione appropriato         │
│ • Gestisce errori e riporta risultati                     │
│ • Qui l'LLM pensa (90% accuratezza per decisione)          │
├─────────────────────────────────────────────────────────────┤
│ LIVELLO 3: ESECUZIONE (Fare il lavoro) — 100% Deterministico│
│ loom/execution/*.py — Script Python che non allucinano     │
│ • Invia la richiesta HTTP reale                           │
│ • Scrive il file effettivo su disco                       │
│ • Fa il commit Git effettivo                              │
│ • Zero token, zero probabilità di errore                  │
└─────────────────────────────────────────────────────────────┘
\`\`\`

---

## D — Direttive (Cosa fare)

**Le Direttive sono SOP (Standard Operating Procedures)** scritte in Markdown. Definiscono:
- **Obiettivo**: Cosa stiamo cercando di realizzare
- **Input**: Quali dati/parametri servono
- **Output**: Cosa deve essere prodotto
- **Tool**: Quale script di esecuzione chiamare

### Insight Chiave
La direttiva viene letta **una volta** all'inizio della sessione e cached. L'agente non la rilegge per ogni task — conosce la SOP e la segue.

### Esempio: \`directives/create-task.md\`

\`\`\`markdown
# Direttiva: Crea Nuovo Task

## Obiettivo
Crea una nuova voce task in TASKS.md con formattazione e metadata corretti.

## Input
- task_id: Formato TASK-XXX (es. TASK-001)
- description: Descrizione chiara e azionabile
- priority: low | medium | high

## Output
- TASKS.md aggiornato con il nuovo task
- Git commit con messaggio: "chore: add TASK-XXX [description]"

## Tool
execution/create_task.py
\`\`\`

---

## O — Orchestrazione (Come decidere)

**L'Orchestrazione è dove lavora l'agente AI.** L'agente:
1. **Parsa la tua richiesta in linguaggio naturale** ("avvia un task per email validation")
2. **Seleziona la direttiva appropriata** (create-task.md)
3. **Estrae i parametri** (task_id=TASK-001, description="email validation")
4. **Chiama lo script di esecuzione** con parametri validati
5. **Gestisce errori** e riporta i risultati a te

### Perché Questo Importa
L'agente fa solo **decisioni ad alto livello** (quale direttiva, quali parametri). Non fa mai:
- Scrivere file direttamente ❌
- Fare commit Git direttamente ❌  
- Eseguire comandi shell direttamente ❌

Quelli vanno agli script di esecuzione deterministici.

### Esempio di Flusso
\`\`\`
Utente: "Crea task TASK-001 per email validation"
  ↓
Agente (Orchestrazione):
  1. Analizza intento → crea nuovo task
  2. Estrae params → id=TASK-001, desc="email validation"
  3. Seleziona direttiva → directives/create-task.md
  4. Valida formato → TASK-001 matcha pattern
  5. Chiama esecuzione → create_task.py --id TASK-001 --desc "email validation"
  ↓
Script (Esecuzione):
  1. Legge TASKS.md
  2. Append nuovo task
  3. Esegue: git add TASKS.md && git commit -m "..."
  4. Ritorna: {"status": "success", "task": "TASK-001"}
  ↓
Agente (Orchestrazione):
  1. Formatta messaggio successo
  2. Mostra ad utente: "✅ Creato TASK-001: email validation"
\`\`\`

---

## E — Esecuzione (Fare il lavoro)

**Gli script di esecuzione sono Python 100% deterministico.** Essi:
- Stanno in \`loom/execution/*.py\`
- Hanno zero coinvolgimento AI/LLM
- Producono lo stesso output per lo stesso input, sempre
- Gestiscono il vero "lavoro" (I/O file, operazioni Git, richieste HTTP)

### Esempio: \`execution/create_task.py\`

\`\`\`python
#!/usr/bin/env python3
import argparse
import re
from datetime import datetime

def create_task(task_id: str, description: str) -> dict:
    """Crea un nuovo task in TASKS.md."""
    # Valida formato task_id
    if not re.match(r'^TASK-\d{3}$', task_id):
        return {"error": "Formato task_id invalido. Usa TASK-XXX"}
    
    # Legge TASKS.md corrente
    with open('TASKS.md', 'r') as f:
        content = f.read()
    
    # Controlla duplicati
    if task_id in content:
        return {"error": f"Task {task_id} già esistente"}
    
    # Append nuovo task
    new_task = f"\n## {task_id}\n**Status**: 🔵 New\n**Desc**: {description}\n**Created**: {datetime.now().isoformat()}\n"
    
    with open('TASKS.md', 'w') as f:
        f.write(content + new_task)
    
    # Git commit
    import subprocess
    subprocess.run(['git', 'add', 'TASKS.md'])
    subprocess.run(['git', 'commit', '-m', f'chore: add {task_id}'])
    
    return {"status": "success", "task": task_id}

if __name__ == '__main__':
    parser = argparse.ArgumentParser()
    parser.add_argument('--id', required=True)
    parser.add_argument('--desc', required=True)
    args = parser.parse_args()
    
    result = create_task(args.id, args.desc)
    print(json.dumps(result))
\`\`\`

### Benefici Chiave
| Aspetto | Prima (LLM fa tutto) | Dopo (DOE) |
|---------|----------------------|------------|
| Accuratezza | 35% allo step 10 | 90% allo step 10 |
| Costo token | Alto (riscrive file) | Basso (solo decisioni) |
| Affidabilità | Inconsistente | Deterministica |
| Velocità | Lento (LLM processa) | Veloce (script Python) |
| Audit trail | Difficile da verificare | Ogni azione loggata |

---

## Esempio Completo: Inviare una Email di Benvenuto

\`\`\`
Utente: "Invia email di benvenuto a user@example.com"

┌──────────────────────────────────────────────────────────┐
│ 1. DIRETTIVA — Agente legge directives/send-email.md    │
│    • Input: email destinatario, nome template            │
│    • Output: conferma invio                              │
│    • Tool: execution/send_email.py                      │
├──────────────────────────────────────────────────────────┤
│ 2. ORCHESTRAZIONE — Agente prende decisioni             │
│    • Seleziona template: "welcome"                      │
│    • Valida formato email: ✓                            │
│    • Chiama: send_email.py --to user@example.com --template welcome
├──────────────────────────────────────────────────────────┤
│ 3. ESECUZIONE — Script fa il lavoro (100% deterministico)│
│    • Carica file template                               │
│    • Chiama API SendGrid                                │
│    • Ritorna: {"status": "sent", "message_id": "xyz"}    │
├──────────────────────────────────────────────────────────┤
│ 4. ORCHESTRAZIONE — Agente formatta risultato           │
│    • Parsa risposta JSON                                │
│    • Mostra: "✅ Email di benvenuto inviata a user@example.com"│
└──────────────────────────────────────────────────────────┘
\`\`\`

---

## Riepilogo

**DOE rende gli agenti AI affidabili perché:**
1. **Cache delle direttive** (legge una volta, usa tutta la sessione)
2. **Limita decisioni LLM** al routing di alto livello (non operazioni su file)
3. **Spinge tutto il lavoro** agli script Python deterministici
4. **Preserva accuratezza** attraverso lunghe sessioni (90% → 90%, non 90% → 35%)

Il risultato: Agenti che funzionano davvero, ogni volta. 🎯`

function renderAll(){
  const sidebar=document.getElementById('sidebar');
  const main=document.getElementById('main');
  sidebar.innerHTML='<div class="sidebar-label"><span class="en">Documentation</span><span class="it">Documentazione</span></div>';
  main.innerHTML='';

  DOCS.forEach(doc=>{
    // sidebar
    const link=document.createElement('a');
    link.href='#'+doc.id;
    link.className='sidebar-link';
    link.innerHTML=doc.icon+' <span class="en">'+doc.labelEn+'</span><span class="it">'+doc.labelIt+'</span>';
    link.addEventListener('click',()=>{
      document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active'));
      link.classList.add('active');
      document.getElementById(doc.id)?.classList.remove('collapsed');
    });
    sidebar.appendChild(link);

    // section
    const sec=document.createElement('div');
    sec.className='doc-section';
    sec.id=doc.id;

    const hdr=document.createElement('div');
    hdr.className='doc-header';
    hdr.innerHTML=
      '<div class="doc-title">'+doc.icon+
      ' <span class="en">'+doc.labelEn+'</span><span class="it">'+doc.labelIt+'</span>'+
      ' <span class="file-badge">'+doc.file+'</span></div>'+
      '<div class="doc-actions">'+
      '<button class="copy-btn" data-content="'+encodeURIComponent(doc.content)+'">&#128203; <span class="en">Copy for AI</span><span class="it">Copia per AI</span></button>'+
      '<span class="toggle">&#9660;</span>'+
      '</div>';

    const body=document.createElement('div');
    body.className='doc-body';
    const currentLang = document.documentElement.dataset.lang || 'en';
    const contentToRender = (currentLang === 'it' && doc.contentIt) ? doc.contentIt : doc.content;
    body.innerHTML=marked.parse(contentToRender);

    hdr.querySelector('.copy-btn').addEventListener('click',function(e){
      e.stopPropagation();
      const btn=this;
      navigator.clipboard.writeText(decodeURIComponent(btn.dataset.content)).then(()=>{
        btn.innerHTML='&#9989; <span class="en">Copied!</span><span class="it">Copiato!</span>';
        btn.classList.add('ok');
        setTimeout(()=>{
          btn.innerHTML='&#128203; <span class="en">Copy for AI</span><span class="it">Copia per AI</span>';
          btn.classList.remove('ok');
        },2000);
      });
    });

    hdr.addEventListener('click',()=>sec.classList.toggle('collapsed'));
    sec.appendChild(hdr);
    sec.appendChild(body);
    main.appendChild(sec);
  });

  // add copy buttons to all pre blocks
  document.querySelectorAll('.doc-body pre').forEach(pre=>{
    const btn=document.createElement('button');
    btn.className='pre-copy';
    btn.textContent='copy';
    btn.addEventListener('click',function(){
      navigator.clipboard.writeText(pre.querySelector('code')?.textContent||pre.textContent).then(()=>{
        btn.textContent='ok!';
        btn.classList.add('ok');
        setTimeout(()=>{btn.textContent='copy';btn.classList.remove('ok');},2000);
      });
    });
    pre.style.position='relative';
    pre.appendChild(btn);
  });

  // syntax highlight
  document.querySelectorAll('pre code').forEach(el=>hljs.highlightElement(el));

  // scroll spy
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        document.querySelectorAll('.sidebar-link').forEach(l=>{
          l.classList.toggle('active',l.getAttribute('href')==='#'+e.target.id);
        });
      }
    });
  },{rootMargin:'-20% 0px -70% 0px'});
  DOCS.forEach(d=>{const el=document.getElementById(d.id);if(el)obs.observe(el);});
}

(function(){
  const lang=localStorage.getItem('loom-lang')||'en';
  const dark=localStorage.getItem('loom-dark')==='true';
  setLang(lang);
  if(dark){
    document.documentElement.dataset.theme='dark';
    document.getElementById('btn-dark').innerHTML='&#9728;&#65039;';
  }
  renderAll();
})();
</script>
