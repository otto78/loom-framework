  content:`# Loom Framework 🧵

> **Weave intelligent agents into your development workflow**

A complete operational framework for AI-powered development across multiple IDEs. Loom provides structure, automation, and best practices for teams working with AI agents.

---

## 🎯 What is Loom?

Loom is an operational framework that brings structure to AI-assisted development. It provides:

- ⚡ **Quick Setup** — Interactive wizard + automated scripts
- 🤖 **Multi-IDE Support** — 7 IDEs (Windsurf, Claude, Cursor, Gemini, VS Code, Copilot, IntelliJ)
- 📋 **Task Management** — Complete system with TASKS.md + BACKLOG.md
- 🧪 **TDD Workflow** — Test-Driven Development integrated
- 📝 **Integrated Versioning** — Automatic STORY.md + CHANGELOG.md
- 🔄 **Automated Workflow** — Python scripts for complete task lifecycle
- 📚 **3-Level Framework** — Directives / Orchestration / Execution
- 🔀 **Handoff Protocol** — Seamless agent-to-agent transitions
- 🧩 **Adaptable** — Works with new and existing projects

---

## 🚀 Quick Start

\`\`\`bash
git clone https://github.com/otto78/loom-framework.git
cd /path/to/your-project
python /path/to/loom-framework/loom/scripts/setup.py
\`\`\`

Or just tell your AI agent: **"setup loom framework"**

---

## 🏗️ The 3-Level Framework

| Level | Name | Description |
|-------|------|-------------|
| 1 | **Directives** | SOPs in natural language — what to do |
| 2 | **Orchestration** | Intelligent routing between directives and scripts |
| 3 | **Execution** | Deterministic Python scripts — do the work |

**Why it works**: LLMs are probabilistic (90% accuracy = 59% over 5 steps). Pushing complexity into deterministic code reduces errors.

---

## 🎨 Supported IDEs

| IDE/Tool | Config File | Location |
|----------|-------------|----------|
| Windsurf | \`.windsurfrules\` | Root |
| Claude Code | \`CLAUDE.md\` | Root |
| Cursor | \`.cursorrules\` | Root |
| Gemini CLI | \`GEMINI.md\` | Root |
| GitHub Copilot | \`copilot-instructions.md\` | \`.github/\` |
| Cline (VS Code) | \`.clinerules\` | Root |
| IntelliJ IDEA | \`agentic-framework.md\` | \`.idea/\` |

---

## 🌟 Why Loom?

**Before Loom:** inconsistent AI behavior, no task tracking, lost context, no testing workflow.

**After Loom:** structured workflows, automatic task management, seamless handoffs, integrated TDD.

---

Get started with Loom in 5 minutes!

## 📦 Installation

Tell your AI agent:

\`\`\`bash

The wizard will:

\`\`\`bash

\`\`\`bash
python loom/scripts/task.py start TASK-001 "Implement user login"

\`\`\`

\`\`\`bash
python loom/scripts/task.py list
python loom/scripts/task.py start TASK-042 "Fix login bug"
python loom/scripts/task.py complete TASK-042 "Bug fixed" --bump patch

Or with natural language:

"complete task TASK-042"

- **\`AGENT.md\`** — Source of truth for your project

  content:`# TDD Workflow — Test-Driven Development

> Complete Test-Driven Development workflow integrated in the framework.

---

## 🎯 What is TDD?

1. **Write tests FIRST** — before any code
2. **Run tests** — they must fail (Red phase)
3. **Write minimal code** — to make tests pass (Green phase)
4. **Refactor** — clean up while keeping tests green

---

## 🔄 Red-Green-Refactor Cycle

\`\`\`
🔴 RED    → Write failing test
🟢 GREEN  → Write minimal code to pass
🔵 REFACTOR → Clean up, tests stay green
↩️  Repeat for next feature
\`\`\`

---

## 🚀 Commands

\`\`\`bash
# Start TDD task (creates test file, runs tests - Red phase)
python scripts/task-tdd.py start TASK-001 "Add email validation"

# Run tests
python scripts/task-tdd.py test

# Complete task (only if all tests pass)
python scripts/task-tdd.py complete TASK-001
\`\`\`

---

## 📝 Example Test File

\`\`\`python
# tests/test_task_001.py

def test_valid_email():
    from myapp import validate_email
    assert validate_email("user@example.com") == True

def test_invalid_email():
    from myapp import validate_email
    assert validate_email("invalid") == False

def test_empty_email():
    from myapp import validate_email
    assert validate_email("") == False
    assert validate_email(None) == False
\`\`\`

---

## 📊 TASKS.md TDD Checklist

\`\`\`markdown
**TDD Workflow:**
- [x] 🔴 Red: Tests created and failing
- [ ] 🟢 Green: Implement feature to pass tests
- [ ] 🔵 Refactor: Clean up code
- [ ] ✅ Complete: All tests passing
\`\`\`

---

## 🎓 Best Practices

- **Small focused tests** — one test, one behavior
- **Descriptive names** — \`test_empty_email_returns_false\`
- **Arrange-Act-Assert** pattern
- **Independent tests** — no shared state
- **Cover edge cases** — empty, null, boundary values`

// ── RENDER ─────────────────────────────────────────────────────────────────────
marked.use({ breaks:true, gfm:true });

function getLang(){ return document.documentElement.dataset.lang || 'en'; }

function renderAll(){
  const sidebar = document.getElementById('sidebar');
  const main = document.getElementById('main');
  sidebar.innerHTML = '<h3 class="en">Documentation</h3><h3 class="it">Documentazione</h3>';
  main.innerHTML = '';

  DOCS.forEach(doc => {
    // sidebar link
    const link = document.createElement('a');
    link.href = '#'+doc.id;
    link.className = 'sidebar-link';
    link.innerHTML = `${doc.icon} <span class="en">${doc.label.en}</span><span class="it">${doc.label.it}</span>`;
    link.addEventListener('click', ()=>{
      document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active'));
      link.classList.add('active');
      document.getElementById(doc.id)?.classList.remove('collapsed');
    });
    sidebar.appendChild(link);

    // section
    const section = document.createElement('div');
    section.className = 'doc-section';
    section.id = doc.id;

    const header = document.createElement('div');
    header.className = 'doc-header';
    header.innerHTML = `
      <div class="doc-title">
        ${doc.icon}
        <span class="en">${doc.label.en}</span><span class="it">${doc.label.it}</span>
      </div>
      <div class="doc-actions">
        <button class="copy-btn">📋 <span class="en">Copy for AI</span><span class="it">Copia per AI</span></button>
        <span class="toggle">▼</span>
      </div>`;

    const body = document.createElement('div');
    body.className = 'doc-body';
    body.innerHTML = marked.parse(doc.content);

    header.querySelector('.copy-btn').addEventListener('click', e=>{
      e.stopPropagation();
      const btn = e.currentTarget;
      navigator.clipboard.writeText(doc.content).then(()=>{
        btn.innerHTML = '✅ <span class="en">Copied!</span><span class="it">Copiato!</span>';
        btn.classList.add('ok');
        setTimeout(()=>{
          btn.innerHTML = '📋 <span class="en">Copy for AI</span><span class="it">Copia per AI</span>';
          btn.classList.remove('ok');
        }, 2000);
      });
    });

    header.addEventListener('click', ()=> section.classList.toggle('collapsed'));

    section.appendChild(header);
    section.appendChild(body);
    main.appendChild(section);
  });

  // scroll spy
  const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        document.querySelectorAll('.sidebar-link').forEach(l=>{
          l.classList.toggle('active', l.getAttribute('href')==='#'+e.target.id);
        });
      }
    });
  },{rootMargin:'-20% 0px -70% 0px'});
  DOCS.forEach(d=>{ const el=document.getElementById(d.id); if(el) observer.observe(el); });

  // syntax highlight
  document.querySelectorAll('pre code').forEach(el=>hljs.highlightElement(el));
}

function setLang(l){
  document.documentElement.dataset.lang=l;
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  document.getElementById('btn-it').classList.toggle('active',l==='it');
  localStorage.setItem('loom-lang',l);
}
function toggleDark(){
  const d=document.documentElement;
  const dark=d.dataset.theme==='dark';
  d.dataset.theme=dark?'light':'dark';
  document.getElementById('btn-dark').textContent=dark?'🌙':'☀️';
  localStorage.setItem('loom-dark',!dark);
}

// init
(function(){
  const lang=localStorage.getItem('loom-lang')||'en';
  const dark=localStorage.getItem('loom-dark')==='true';
  setLang(lang);
  if(dark){document.documentElement.dataset.theme='dark';document.getElementById('btn-dark').textContent='☀️';}
  renderAll();
})();
</script>
