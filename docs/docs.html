  content:`# Loom Framework

> **Weave intelligent agents into your development workflow**

A complete operational framework for AI-powered development across multiple IDEs.

---

## What is Loom?

- **Quick Setup** — Interactive wizard + automated scripts
- **Multi-IDE Support** — 6 IDEs (Windsurf, Claude Code, Cursor, Gemini CLI, VS Code, IntelliJ IDEA)
- **Task Management** — TASKS.md + BACKLOG.md
- **TDD Workflow** — Test-Driven Development integrated
- **3-Level Framework** — Directives / Orchestration / Execution
- **Handoff Protocol** — Seamless agent-to-agent transitions

---

## Supported IDEs

| IDE/Tool | Config File | Location |
|----------|-------------|----------|
| Windsurf | \`.windsurfrules\` | Root |
| Claude Code | \`CLAUDE.md\` | Root |
| Cursor | \`.cursorrules\` | Root |
| Gemini CLI | \`GEMINI.md\` | Root |
| VS Code | \`.clinerules\` | Root |
| IntelliJ IDEA | \`agentic-framework.md\` | \`.idea/\` |

---

## Why Loom?

**Before:** inconsistent AI behavior, no task tracking, lost context between sessions.

**After:** structured workflows, automatic task management, seamless handoffs, integrated TDD.

---

**Version**: 1.0.0 | **Author**: Andrea Mazzarotto | **License**: MIT`

  content:`# Quick Start

Get started with Loom in 5 minutes!

---

## Installation

\`\`\`bash
git clone https://github.com/otto78/loom-framework.git
cd loom-framework
\`\`\`

---

## Setup Your Project

### Method 1: Natural Language (Recommended)

Tell your AI agent:

\`\`\`
"setup loom framework"
\`\`\`

### Method 2: Interactive Wizard

\`\`\`bash
cd /path/to/your-project
python /path/to/loom-framework/loom/scripts/setup.py
\`\`\`

The wizard will detect your languages, frameworks, and IDEs automatically.

### Method 3: Automated

\`\`\`bash
python loom/scripts/setup.py --auto --project-name "MyProject" --ide windsurf,cursor
\`\`\`

---

## Your First Task

\`\`\`bash
python loom/scripts/task.py start TASK-001 "Implement user login"
\`\`\`

Or tell your AI agent:

\`\`\`
"start task TASK-001 'implement user login'"
\`\`\`

---

## Daily Workflow

\`\`\`bash
python loom/scripts/task.py list
python loom/scripts/task.py start TASK-042 "Fix login bug"
python loom/scripts/task.py complete TASK-042 "Bug fixed" --bump patch
\`\`\`

Or with natural language:

\`\`\`
"list tasks"
"start task TASK-042 'fix login bug'"
"complete task TASK-042"
\`\`\`

---

## Key Files After Setup

- **\`AGENT.md\`** — Source of truth for your project
- **\`docs/TASKS.md\`** — Active tasks
- **\`docs/BACKLOG.md\`** — Future ideas
- **\`docs/STORY.md\`** — Project history
- **IDE config files** — \`.windsurfrules\`, \`.cursorrules\`, etc.

---

**Time to setup**: ~5 minutes | **Time to first task**: ~2 minutes`

  content:`# TDD Workflow — Test-Driven Development

> Complete Test-Driven Development workflow integrated in the framework.

---

## What is TDD?

1. **Write tests FIRST** — before any code
2. **Run tests** — they must fail (Red phase)
3. **Write minimal code** — to make tests pass (Green phase)
4. **Refactor** — clean up while keeping tests green

---

## Red-Green-Refactor Cycle

\`\`\`
RED    -> Write failing test
GREEN  -> Write minimal code to pass
REFACTOR -> Clean up, tests stay green
Repeat for next feature
\`\`\`

---

## Commands

\`\`\`bash
# Start TDD task (creates test file, runs tests - Red phase)
python scripts/task-tdd.py start TASK-001 "Add email validation"

# Run tests
python scripts/task-tdd.py test

# Complete task (only if all tests pass)
python scripts/task-tdd.py complete TASK-001
\`\`\`

---

## Example Test File

\`\`\`python
# tests/test_task_001.py

def test_valid_email():
    from myapp import validate_email
    assert validate_email("user@example.com") == True

def test_invalid_email():
    from myapp import validate_email
    assert validate_email("invalid") == False

def test_empty_email():
    from myapp import validate_email
    assert validate_email("") == False
    assert validate_email(None) == False
\`\`\`

---

## TASKS.md TDD Checklist

\`\`\`markdown
**TDD Workflow:**
- [x] Red: Tests created and failing
- [ ] Green: Implement feature to pass tests
- [ ] Refactor: Clean up code
- [ ] Complete: All tests passing
\`\`\`

---

## Best Practices

- **Small focused tests** — one test, one behavior
- **Descriptive names** — \`test_empty_email_returns_false\`
- **Arrange-Act-Assert** pattern
- **Independent tests** — no shared state
- **Cover edge cases** — empty, null, boundary values`
},

> This file is read by AI agents to understand how to setup the framework.

## Trigger Phrases

## Setup Procedure

### Step 1: Detect Project Context

\`\`\`python
project_root = current_working_directory
languages = detect_languages()    # Python, JavaScript, etc.
frameworks = detect_frameworks()  # FastAPI, React, etc.

### Step 2: Ask Confirmation

\`\`\`
I detected:
- Project: [name]
- Languages: [python, javascript]
- IDEs in use: [cursor, vscode]

Do you want me to setup Loom Framework?
\`\`\`

### Step 3: Run Setup

\`\`\`bash
python loom/scripts/setup.py --auto --project-name "[name]" --ide [ides]
\`\`\`

---

## Command Mapping

| User Says | Execute |
|-----------|---------|
| "setup framework" | \`python loom/scripts/setup.py\` |
| "start task TASK-XXX 'desc'" | \`python loom/scripts/task.py start TASK-XXX "desc"\` |
| "list tasks" | \`python loom/scripts/task.py list\` |
| "run tests" | \`python loom/scripts/task-tdd.py test\` |
| "complete task TASK-XXX" | \`python loom/scripts/task.py complete TASK-XXX "done"\` |
| "sync configs" | \`bash loom/scripts/sync-configs.sh\` |

Thank you for your interest in contributing!

---

## How to Contribute

### Report Issues
1. Check [existing issues](https://github.com/otto78/loom-framework/issues)
2. [Create a new issue](https://github.com/otto78/loom-framework/issues/new)

### Add IDE Support
1. Create config template in \`loom/ide-configs/your-ide/\`
2. Update \`loom/scripts/setup.py\` to detect and configure it
3. Add to README.md IDE support table
4. Submit a pull request

---

## Development Setup

\`\`\`bash
git clone https://github.com/otto78/loom-framework.git
cd loom-framework
python -m venv venv
source venv/bin/activate  # Windows: venv\\Scripts\\activate
pip install -r requirements-dev.txt
pytest tests/
\`\`\`

---

## Pull Request Process

1. Fork the repository
2. Create branch: \`git checkout -b feature/amazing-feature\`
3. Make changes and test
4. Commit: \`git commit -m "feat: add amazing feature"\`
5. Push and open a pull request

### Commit Format

\`\`\`
feat: add support for PyCharm IDE
fix: resolve task completion bug
docs: update QUICKSTART guide
test: add tests for setup wizard
\`\`\`

---

## Code Standards

- Python: PEP 8, type hints, docstrings
- Scripts: error handling, \`--dry-run\` support
- Tests required for new features

---

**Every contribution makes Loom better for everyone.**`

function renderAll(){
  const sidebar=document.getElementById('sidebar');
  const main=document.getElementById('main');
  sidebar.innerHTML='<div class="sidebar-label"><span class="en">Documentation</span><span class="it">Documentazione</span></div>';
  main.innerHTML='';

  DOCS.forEach(doc=>{
    // sidebar
    const link=document.createElement('a');
    link.href='#'+doc.id;
    link.className='sidebar-link';
    link.innerHTML=doc.icon+' <span class="en">'+doc.labelEn+'</span><span class="it">'+doc.labelIt+'</span>';
    link.addEventListener('click',()=>{
      document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active'));
      link.classList.add('active');
      document.getElementById(doc.id)?.classList.remove('collapsed');
    });
    sidebar.appendChild(link);

    // section
    const sec=document.createElement('div');
    sec.className='doc-section';
    sec.id=doc.id;

    const hdr=document.createElement('div');
    hdr.className='doc-header';
    hdr.innerHTML=
      '<div class="doc-title">'+doc.icon+
      ' <span class="en">'+doc.labelEn+'</span><span class="it">'+doc.labelIt+'</span>'+
      ' <span class="file-badge">'+doc.file+'</span></div>'+
      '<div class="doc-actions">'+
      '<button class="copy-btn" data-content="'+encodeURIComponent(doc.content)+'">&#128203; <span class="en">Copy for AI</span><span class="it">Copia per AI</span></button>'+
      '<span class="toggle">&#9660;</span>'+
      '</div>';

    const body=document.createElement('div');
    body.className='doc-body';
    body.innerHTML=marked.parse(doc.content);

    hdr.querySelector('.copy-btn').addEventListener('click',function(e){
      e.stopPropagation();
      const btn=this;
      navigator.clipboard.writeText(decodeURIComponent(btn.dataset.content)).then(()=>{
        btn.innerHTML='&#9989; <span class="en">Copied!</span><span class="it">Copiato!</span>';
        btn.classList.add('ok');
        setTimeout(()=>{
          btn.innerHTML='&#128203; <span class="en">Copy for AI</span><span class="it">Copia per AI</span>';
          btn.classList.remove('ok');
        },2000);
      });
    });

    hdr.addEventListener('click',()=>sec.classList.toggle('collapsed'));
    sec.appendChild(hdr);
    sec.appendChild(body);
    main.appendChild(sec);
  });

  // add copy buttons to all pre blocks
  document.querySelectorAll('.doc-body pre').forEach(pre=>{
    const btn=document.createElement('button');
    btn.className='pre-copy';
    btn.textContent='copy';
    btn.addEventListener('click',function(){
      navigator.clipboard.writeText(pre.querySelector('code')?.textContent||pre.textContent).then(()=>{
        btn.textContent='ok!';
        btn.classList.add('ok');
        setTimeout(()=>{btn.textContent='copy';btn.classList.remove('ok');},2000);
      });
    });
    pre.style.position='relative';
    pre.appendChild(btn);
  });

  // syntax highlight
  document.querySelectorAll('pre code').forEach(el=>hljs.highlightElement(el));

  // scroll spy
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        document.querySelectorAll('.sidebar-link').forEach(l=>{
          l.classList.toggle('active',l.getAttribute('href')==='#'+e.target.id);
        });
      }
    });
  },{rootMargin:'-20% 0px -70% 0px'});
  DOCS.forEach(d=>{const el=document.getElementById(d.id);if(el)obs.observe(el);});
}

(function(){
  const lang=localStorage.getItem('loom-lang')||'en';
  const dark=localStorage.getItem('loom-dark')==='true';
  setLang(lang);
  if(dark){
    document.documentElement.dataset.theme='dark';
    document.getElementById('btn-dark').innerHTML='&#9728;&#65039;';
  }
  renderAll();
})();
</script>
