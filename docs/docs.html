AI-assisted development faces critical challenges:

- рҹ§  **Persistent Memory** вҖ” TASKS.md, STORY.md survive resets.

- рҹҡҖ **Zero-Friction** вҖ” Just say "read loom".

  id:'tdd',icon:'&#129514;',labelEn:'TDD Workflow',labelIt:'Workflow TDD',file:'TDD-WORKFLOW.md',
  content:`# TDD Workflow вҖ” Test-Driven Development

> Complete Test-Driven Development workflow integrated in the framework.

---

## What is TDD?

1. **Write tests FIRST** вҖ” before any code
2. **Run tests** вҖ” they must fail (Red phase)
3. **Write minimal code** вҖ” to make tests pass (Green phase)
4. **Refactor** вҖ” clean up while keeping tests green

---

## Red-Green-Refactor Cycle

\`\`\`
RED    -> Write failing test
GREEN  -> Write minimal code to pass
REFACTOR -> Clean up, tests stay green
Repeat for next feature
\`\`\`

---

## Commands

\`\`\`bash
# Start TDD task (creates test file, runs tests - Red phase)
python scripts/task-tdd.py start TASK-001 "Add email validation"

# Run tests
python scripts/task-tdd.py test

# Complete task (only if all tests pass)
python scripts/task-tdd.py complete TASK-001
\`\`\`

---

## Example Test File

\`\`\`python
# tests/test_task_001.py

def test_valid_email():
    from myapp import validate_email
    assert validate_email("user@example.com") == True

def test_invalid_email():
    from myapp import validate_email
    assert validate_email("invalid") == False

def test_empty_email():
    from myapp import validate_email
    assert validate_email("") == False
    assert validate_email(None) == False
\`\`\`

---

## TASKS.md TDD Checklist

\`\`\`markdown
**TDD Workflow:**
- [x] Red: Tests created and failing
- [ ] Green: Implement feature to pass tests
- [ ] Refactor: Clean up code
- [ ] Complete: All tests passing
\`\`\`

---

## Best Practices

- **Small focused tests** вҖ” one test, one behavior
- **Descriptive names** вҖ” \`test_empty_email_returns_false\`
- **Arrange-Act-Assert** pattern
- **Independent tests** вҖ” no shared state
- **Cover edge cases** вҖ” empty, null, boundary values`

  content:`# Setup Instructions вҖ” For AI Agents

## Trigger Phrases

- Languages: [python, javascript]
- IDEs in use: [cursor, vscode]

\`\`\`

### Step 3: Run Setup

\`\`\`bash
python loom/scripts/setup.py --auto --project-name "[name]" --ide [ides]
\`\`\`

---

## Command Mapping

| User Says | Execute |
|-----------|---------|
| "setup framework" | \`python loom/scripts/setup.py\` |
| "start task TASK-XXX 'desc'" | \`python loom/scripts/task.py start TASK-XXX "desc"\` |
| "list tasks" | \`python loom/scripts/task.py list\` |
| "run tests" | \`python loom/scripts/task-tdd.py test\` |
| "complete task TASK-XXX" | \`python loom/scripts/task.py complete TASK-XXX "done"\` |
| "sync configs" | \`bash loom/scripts/sync-configs.sh\` |

---

## Important Notes

1. **Always read AGENT.md first** вҖ” it contains project context
2. **Respect existing files** вҖ” do not overwrite TASKS.md, README.md

  id:'framework',icon:'&#127959;&#65039;',labelEn:'DOE Architecture',labelIt:'Architettura DOE',file:'3-level-framework.md',
  content:`# DOE Architecture

> Separate responsibilities to maximize reliability and reduce LLM errors.

---

## The Problem

LLMs are probabilistic. Each decision has ~90% accuracy.

**The math:**
- 1 step: 90% success
- 2 steps: 81% (0.9 Г— 0.9)
- 5 steps: 59%
- 10 steps: 35%

Chaining LLM decisions leads to frequent failures. The solution: push complexity into deterministic code.

---

## Architecture: DOE

DOE stands for **D**irectives, **O**rchestration, and **E**xecution.

\`\`\`

Thank you for your interest in contributing!

---

## How to Contribute

### Report Issues
1. Check [existing issues](https://github.com/otto78/loom/issues)
2. [Create a new issue](https://github.com/otto78/loom/issues/new)

### Add IDE Support
1. Create config template in \`loom/ide-configs/your-ide/\`
2. Update \`loom/scripts/setup.py\` to detect and configure it
3. Add to README.md IDE support table
4. Submit a pull request

---

## Development Setup

\`\`\`bash
git clone https://github.com/otto78/loom.git
cd loom
python -m venv venv
source venv/bin/activate  # Windows: venv\\Scripts\\activate
pip install -r requirements-dev.txt
pytest tests/
\`\`\`

---

## Pull Request Process

1. Fork the repository
2. Create branch: \`git checkout -b feature/amazing-feature\`
3. Make changes and test
4. Commit: \`git commit -m "feat: add amazing feature"\`
5. Push and open a pull request

### Commit Format

\`\`\`
feat: add support for PyCharm IDE
fix: resolve task completion bug
docs: update QUICKSTART guide
test: add tests for setup wizard
\`\`\`

---

## Code Standards

- Python: PEP 8, type hints, docstrings
- Scripts: error handling, \`--dry-run\` support
- Tests required for new features

---

**Every contribution makes loom better for everyone.**`

function renderAll(){
  const sidebar=document.getElementById('sidebar');
  const main=document.getElementById('main');
  sidebar.innerHTML='<div class="sidebar-label"><span class="en">Documentation</span><span class="it">Documentazione</span></div>';
  main.innerHTML='';

  DOCS.forEach(doc=>{
    // sidebar
    const link=document.createElement('a');
    link.href='#'+doc.id;
    link.className='sidebar-link';
    link.innerHTML=doc.icon+' <span class="en">'+doc.labelEn+'</span><span class="it">'+doc.labelIt+'</span>';
    link.addEventListener('click',()=>{
      document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active'));
      link.classList.add('active');
      document.getElementById(doc.id)?.classList.remove('collapsed');
    });
    sidebar.appendChild(link);

    // section
    const sec=document.createElement('div');
    sec.className='doc-section';
    sec.id=doc.id;

    const hdr=document.createElement('div');
    hdr.className='doc-header';
    hdr.innerHTML=
      '<div class="doc-title">'+doc.icon+
      ' <span class="en">'+doc.labelEn+'</span><span class="it">'+doc.labelIt+'</span>'+
      ' <span class="file-badge">'+doc.file+'</span></div>'+
      '<div class="doc-actions">'+
      '<button class="copy-btn" data-content="'+encodeURIComponent(doc.content)+'">&#128203; <span class="en">Copy for AI</span><span class="it">Copia per AI</span></button>'+
      '<span class="toggle">&#9660;</span>'+
      '</div>';

    const body=document.createElement('div');
    body.className='doc-body';
    const currentLang = document.documentElement.dataset.lang || 'en';
    const contentToRender = (currentLang === 'it' && doc.contentIt) ? doc.contentIt : doc.content;
    body.innerHTML=marked.parse(contentToRender);

    hdr.querySelector('.copy-btn').addEventListener('click',function(e){
      e.stopPropagation();
      const btn=this;
      navigator.clipboard.writeText(decodeURIComponent(btn.dataset.content)).then(()=>{
        btn.innerHTML='&#9989; <span class="en">Copied!</span><span class="it">Copiato!</span>';
        btn.classList.add('ok');
        setTimeout(()=>{
          btn.innerHTML='&#128203; <span class="en">Copy for AI</span><span class="it">Copia per AI</span>';
          btn.classList.remove('ok');
        },2000);
      });
    });

    hdr.addEventListener('click',()=>sec.classList.toggle('collapsed'));
    sec.appendChild(hdr);
    sec.appendChild(body);
    main.appendChild(sec);
  });

  // add copy buttons to all pre blocks
  document.querySelectorAll('.doc-body pre').forEach(pre=>{
    const btn=document.createElement('button');
    btn.className='pre-copy';
    btn.textContent='copy';
    btn.addEventListener('click',function(){
      navigator.clipboard.writeText(pre.querySelector('code')?.textContent||pre.textContent).then(()=>{
        btn.textContent='ok!';
        btn.classList.add('ok');
        setTimeout(()=>{btn.textContent='copy';btn.classList.remove('ok');},2000);
      });
    });
    pre.style.position='relative';
    pre.appendChild(btn);
  });

  // syntax highlight
  document.querySelectorAll('pre code').forEach(el=>hljs.highlightElement(el));

  // scroll spy
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        document.querySelectorAll('.sidebar-link').forEach(l=>{
          l.classList.toggle('active',l.getAttribute('href')==='#'+e.target.id);
        });
      }
    });
  },{rootMargin:'-20% 0px -70% 0px'});
  DOCS.forEach(d=>{const el=document.getElementById(d.id);if(el)obs.observe(el);});
}

(function(){
  const lang=localStorage.getItem('loom-lang')||'en';
  const dark=localStorage.getItem('loom-dark')==='true';
  setLang(lang);
  if(dark){
    document.documentElement.dataset.theme='dark';
    document.getElementById('btn-dark').innerHTML='&#9728;&#65039;';
  }
  renderAll();
})();
</script>
