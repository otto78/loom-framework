name: Release LOOM ZIP

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Extract version
        id: version
        run: |
          VERSION=$(python -c "import re; content=open('pyproject.toml').read(); print(re.search(r'version = \"([^\"]+)\"', content).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Building LOOM v$VERSION"

      - name: Build LOOM ZIP
        run: |
          python loom/scripts/build-zip.py --version ${{ steps.version.outputs.version }}
          cp loom-framework-${{ steps.version.outputs.version }}.zip loom-framework.zip

      - name: Verify ZIP contents
        run: |
          if [ -f "loom-framework.zip" ]; then
            echo "✅ ZIP created successfully"
            unzip -l loom-framework.zip | head -20
          else
            echo "❌ ZIP file not found!"
            exit 1
          fi

      - name: Update latest release ZIP
        run: |
          LATEST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          if [ -n "$LATEST_TAG" ]; then
            gh release upload "$LATEST_TAG" loom-framework.zip --clobber
            echo "✅ Updated loom-framework.zip in release $LATEST_TAG"
          else
            echo "⚠️ No existing release found, skipping upload"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
